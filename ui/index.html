<!DOCTYPE html>
<html lang="en">
<head>
    <title>Messaging</title>
</head>
<body>

<a href="#" onclick="window.location.href='/email'">send</a>

<script>
    addEventListener('load', e => {
        document.querySelector('a')
            .addEventListener('click', e => {
                e.preventDefault();
                window.location.href = '/email';
            })
    })
</script>
</body>
</html>
